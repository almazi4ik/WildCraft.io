<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CraftWars.io</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <!-- СТАРТОВОЕ МЕНЮ ПО ЦЕНТРУ -->
    <div id="main-menu">
        <div class="menu-box">
            <h1 class="game-logo">CraftWars.io</h1>
            <input type="text" id="nickname-input" placeholder="Никнейм..." maxlength="12" value="Рейнджер">
            <button id="btn-play" onclick="startGame()">PLAY</button>
            <div id="connection-status">Подключение к серверу...</div>
        </div>
    </div>

    <!-- ИГРОВОЙ ИНТЕРФЕЙС -->
    <div id="game-ui" class="hidden">
        <div id="left-menu-container">
            <button class="menu-btn" onclick="toggleWindow('inventory-window')">Рюкзак (I)</button>
            <button class="menu-btn" onclick="toggleWindow('craft-window')">Крафт (C)</button>
        </div>

        <div id="inventory-window" class="game-window hidden">
            <div class="window-header"><h3>Инвентарь</h3><button class="close-btn" onclick="toggleWindow('inventory-window')">×</button></div>
            <div class="window-content">
                <div class="res-item">Дерево: <span id="res-wood">0</span></div>
                <div class="res-item">Камень: <span id="res-stone">0</span></div>
            </div>
        </div>

        <div id="craft-window" class="game-window hidden">
            <div class="window-header"><h3>Крафт блоков</h3><button class="close-btn" onclick="toggleWindow('craft-window')">×</button></div>
            <div class="window-content grid">
                <div class="craft-item" onclick="craftItem('wood_wall')"><span>Дер. Стена</span><span class="item-cost">10 Дер.</span></div>
                <div class="craft-item" onclick="craftItem('stone_wall')"><span>Кам. Стена</span><span class="item-cost">15 Кам.</span></div>
                <div class="craft-item" onclick="craftItem('spike')"><span>Шипы</span><span class="item-cost">10Д / 5К</span></div>
            </div>
        </div>

        <div id="hotbar">
            <div class="slot active" data-slot="1"><span>1</span><div class="slot-icon">Топор</div></div>
            <div class="slot" data-slot="2"><span>2</span><div class="slot-icon">Кирка</div></div>
            <div class="slot" data-slot="3"><span>3</span><div class="slot-icon">Пусто</div></div>
            <div class="slot" data-slot="4"><span>4</span><div class="slot-icon">Пусто</div></div>
            <div class="slot" data-slot="5"><span>5</span><div class="slot-icon">Пусто</div></div>
        </div>

        <div id="radar-container">
            <canvas id="radarCanvas" width="150" height="150"></canvas>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="ui.js"></script>
</body>
</html>
